<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayOff Amateurs — Suivi 12 Semaines</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f4f0; color: #1a1a1a; padding: 2rem; }
  h1 { font-size: 20px; font-weight: 600; color: #1B2A4A; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 2rem; }
  .sprint-block { margin-bottom: 1.2rem; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; background: #fff; }
  .sprint-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; background: #f0eeea; }
  .sprint-header:hover { background: #e8e6e0; }
  .sprint-header h3 { font-size: 13px; font-weight: 600; color: #1B2A4A; flex: 1; }
  .sprint-label { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .label-done { background: #d4edda; color: #155724; }
  .label-partial { background: #fff3cd; color: #856404; }
  .label-todo { background: #f8d7da; color: #721c24; }
  .chevron { font-size: 18px; color: #888; transition: transform 0.2s; display: inline-block; }
  .sprint-body { display: none; border-top: 1px solid #eee; }
  .sprint-body.open { display: block; }
  .sem-row { padding: 14px 16px; border-bottom: 1px solid #f0eeea; }
  .sem-row:last-child { border-bottom: none; }
  .sem-title { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 20px; margin-bottom: 10px; }
  .badge-done { background: #d4edda; color: #155724; }
  .badge-partial { background: #fff3cd; color: #856404; }
  .badge-todo { background: #f8d7da; color: #721c24; }
  .cols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .col-head { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.03em; }
  .col-body { font-size: 12px; color: #333; line-height: 1.6; }
  .col-body.col-fait { border-left: 3px solid #1B2A4A; padding-left: 8px; }
  @media print {
    body { background: white; padding: 1rem; }
    .sprint-body { display: block !important; }
    .chevron { display: none; }
    .sprint-header { cursor: default; }
    .sprint-block { break-inside: avoid; }
  }
  @media (max-width: 700px) {
    .cols { grid-template-columns: 1fr; }
  }
  .print-btn { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 1.5rem; padding: 8px 16px; border: 1px solid #1B2A4A; border-radius: 6px; background: #1B2A4A; color: white; font-size: 13px; font-weight: 500; cursor: pointer; }
  .print-btn:hover { background: #142036; }
  .legend { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-done { background: #28a745; }
  .dot-partial { background: #ffc107; }
  .dot-todo { background: #dc3545; }
</style>
</head>
<body>

<h1>PlayOff Amateurs / TerrainLink — Suivi 12 semaines</h1>
<p class="subtitle">RNCP 39108 · Product Builder No-Code · École Cube · Bootcamp 2026</p>

<button class="print-btn" onclick="window.print()">🖨️ Imprimer / Exporter en PDF</button>

<div class="legend">
  <div class="leg-item"><div class="leg-dot dot-done"></div> Fait</div>
  <div class="leg-item"><div class="leg-dot dot-partial"></div> Partiel</div>
  <div class="leg-item"><div class="leg-dot dot-todo"></div> À faire</div>
</div>

<div id="sprints"></div>

<script>
const data = [
  {
    label:"Sprint 1 — Semaines 1 & 2 · Structuration du projet et des données métier",
    status:"done", statusLabel:"✓ Fait",
    sems:[
      {
        title:"Semaine 1 — Prise de poste et cadrage produit",
        attendu:"Roadmap 12 semaines dans Notion (6 sprints × 2 sem., objectif unique, outils, nature du travail). Backlog initial (6 champs : Titre, Description, Type, Priorité, Statut, Sprint cible). Template Sprint Review (7 sections exactes, phrase d'aide par section). Première Sprint Review complétée et reliée au backlog fictif.",
        conditions:"Roadmap = vue structurée par sprint. Backlog = vue exploitable en réunion, pas de texte libre non structuré. Template duplicable. Liens Notion entre Sprint Review, roadmap et item backlog obligatoires.",
        statut:"done",
        realise:"Notion workspace opérationnel (flying-rest-f84.notion.site). Roadmap 12 semaines créée avec 6 sprints, objectifs et outils. Backlog structuré avec les 6 champs. Template Sprint Review avec les 7 sections et phrases d'aide. Première Sprint Review complétée et liée au backlog fictif. Compte-rendus RM1–RM2 générés."
      },
      {
        title:"Semaine 2 — Refonte du cycle de vie d'une compétition",
        attendu:"Base Airtable (5 tables : Compétition, Club, Équipe, Match, Contact) avec tous les champs requis et relations inter-tables. Page 🔒 Sécurité dans Notion avec note sur la visibilité des données de contact. Mise à jour Backlog + Roadmap + Sprint Review.",
        conditions:"Table Compétition : 8 champs min dont statut 5 valeurs (Brouillon → Terminée). Table Contact : données personnelles → note sécurité obligatoire immédiatement. Les 5 tables doivent être reliées entre elles (relations nommées).",
        statut:"done",
        realise:"Base Airtable créée avec les 5 tables et tous les champs requis. Relations inter-tables configurées (Club ↔ Équipe ↔ Compétition ↔ Match ↔ Contact). Page Sécurité Notion créée avec note sur la visibilité des données de contact. Audit OMNI AI réalisé sur la base Airtable pour vérifier cohérence et complétude. Backlog, Roadmap et Sprint Review mis à jour."
      }
    ]
  },
  {
    label:"Sprint 2 — Semaines 3 & 4 · De la BDD à l'automatisation",
    status:"done", statusLabel:"✓ Fait",
    sems:[
      {
        title:"Semaine 3 — Alimentation de la base",
        attendu:"Airtable enrichi : champs calculés (nb joueurs, complétude équipe, nb équipes match, validité match, nb équipes compétition, statut lisible). Vues : Équipes complètes, Équipes incomplètes, Matchs prêts à être joués, Compétitions à piloter. Formulaire client avec préremplissage. Automatisation native (statut → date validation). ~30 contacts générés par IA injectés. Propositions de tableaux de pilotage. Documentation Airtable. Notion mis à jour.",
        conditions:"Équipe complète = 5 joueurs min. Match valide = date + 2 équipes complètes. Formulaire : préremplissage compétition obligatoire, pas d'accès direct à la base. Contact joueur distingué du contact admin (choix à argumenter). Cas dégradé : équipe passe de 5 à 4 joueurs → comportement à expliciter.",
        statut:"done",
        realise:"Champs calculés ajoutés sur les 3 tables. Vues opérationnelles créées. Formulaire Airtable avec préremplissage fonctionnel. Automatisation native : passage statut 'Inscription validée' → date de validation renseignée automatiquement. ~30 contacts fictifs injectés via IA. Tableaux de pilotage proposés par rôle (Opérations, Direction). Documentation Airtable complète. Limite native identifiée : email complexe + SMS + condition délai (demande de Jérôme en fin de semaine) impossible avec les automatisations natives → ouverture sur Make."
      },
      {
        title:"Semaine 4 — Benchmark et automatisations",
        attendu:"Benchmark Make / Zapier / n8n dans Notion avec recommandation argumentée et contextualisée. Premier scénario Make : équipe complète → mise à jour statut Airtable + email responsable + événement Google Calendar. Notion mis à jour.",
        conditions:"Benchmark : 6 critères min (prise en main, lisibilité scénarios, règles métier complexes, déploiement, maîtrise des coûts, intégration Google). Recommandation : pourquoi l'outil choisi ET pourquoi les autres sont moins adaptés dans ce contexte précis. Scénario Make : lisible, compréhensible par une autre personne, facilement modifiable.",
        statut:"done",
        realise:"Benchmark réalisé dans Notion → Make recommandé (lisibilité visuelle des scénarios, intégration Google native, coûts maîtrisés, scalabilité sans remise à plat). Scénario 1 Make construit et testé : trigger Airtable (équipe complète) → update statut Airtable → email Gmail → event Google Calendar. Blueprint JSON exporté. Scénario lisible et documenté avec objectif, déclencheur, résultat attendu et limites."
      }
    ]
  },
  {
    label:"Sprint 3 — Semaines 5 & 6 · Fin de la mission automatisation",
    status:"done", statusLabel:"✓ Fait",
    sems:[
      {
        title:"Semaine 5 — Automatiser la préparation d'une compétition",
        attendu:"Scénario Make 2 : déclencheur statut 'Inscriptions clôturées' → fiche compétition générée automatiquement (Google Doc) + envoi email Ops. Anticipation cas incomplets/incohérents. Traçabilité exécution visible Ops. Section Sécurité Make dans Notion. Document de passation pour le Responsable des Opérations. Notion mis à jour.",
        conditions:"Fiche compétition min. : nom, dates, ville/zone, nb équipes inscrites, brief opérationnel synthétique. Comportement clair si données manquantes ou incohérentes. Indicateur de statut + date dernière exécution + visibilité en cas de problème. Page Sécurité : liste scénarios, données manipulées, risques, mesures de limitation.",
        statut:"done",
        realise:"Scénario 2 Make fonctionnel : trigger Airtable (statut Inscriptions clôturées) → Text Aggregator (agrégation données compétition + brief synthétique, sans appel API IA) → Google Doc généré → email Gmail équipes Ops. Note : brief produit par Text Aggregator et non par IA générative — choix documenté et argumenté. Page Sécurité Make complétée : inventaire données par scénario, tableaux risques par sévérité, procédure incident (<1h désactivation, <72h déclaration CNIL si fuite avérée). Document de passation opérationnelle rédigé pour Jérôme."
      },
      {
        title:"Semaine 6 — Mise en place d'un Design System simple",
        attendu:"Fichier Figma : page Design System (couleurs, typographies, composants UI) + page Écrans clés (2-3 écrans parcours principal TerrainLink). Documentation des choix visuels et règles d'usage. Notion mis à jour.",
        conditions:"4 couleurs exactement (principale, secondaire, neutre/fond, CTA). 2 polices + hiérarchie (titre, texte, libellé). Composants : bouton principal, bouton secondaire, champ formulaire, carte terrain et/ou réservation. Cas d'usage : joueur voit terrains → choisit créneau → comprend coût total et répartition des frais.",
        statut:"done",
        realise:"Design System Figma créé. Palette officielle confirmée et appliquée : Violet #6D4AFF (couleur principale / identité PlayOff), Bleu #4FA3FF (secondaire), Vert #22C55E (CTA), fond neutre. Typographies : Poppins SemiBold (titres) / Inter Regular (corps). Composants UI créés. 3 écrans TerrainLink : Écran 1 — Sélection terrain, Écran 2 — Choix du créneau, Écran 3 — Récapitulatif réservation et répartition des frais (paiement unique payeur autorisé + montant de remboursement affiché aux autres joueurs). Clarification documentée : la répartition des frais est informative, pas un split de paiement multi-parties."
      }
    ]
  },
  {
    label:"Sprint 4 — Semaines 7 & 8 · Démo Lovable et préparation du développement",
    status:"partial", statusLabel:"⚡ Partiel",
    sems:[
      {
        title:"Semaine 7 — Démo cliquable sous Lovable",
        attendu:"Lien vers démo Lovable fonctionnelle en condition de démonstration orale. Documentation produit (intention, périmètre couvert, ce qui est simulé). Liste d'écrans pour future implémentation Bubble. Prompt sauvegardé dans Notion. Notion mis à jour.",
        conditions:"Écrans Figma exportés (PNG/PDF) et inclus explicitement dans le prompt Lovable comme inspiration visuelle. 2-3 écrans clés max, sans BDD réelle. Prompt : contexte produit + parcours + périmètre simulé + optimisation crédits. Modifications manuelles directement dans le code (pas de prompting répété). Écran création de compte fictif obligatoire.",
        statut:"partial",
        realise:"Démo Lovable construite et déployée. Écran 1 (sélection terrain) et Écran 2 (sélection du jour) fonctionnels et cliquables. Écran 3 (grille de créneaux horaires) : la sélection du jour fonctionne et affiche la grille, mais le clic sur un créneau horaire ne déclenche pas de transition vers le récapitulatif → non résolu en fin de session (diagnostic : problème non-code, lag build/deploy Lovable). Prompt sauvegardé dans Notion. Documentation produit rédigée. Limitation Lovable documentée et argumentable. Partiel mais défendable : 2 écrans sur 3 pleinement fonctionnels."
      },
      {
        title:"Semaine 8 — Définir la structure de la base de données",
        attendu:"Schéma BDD relationnelle : objets principaux, relations (1-N, N-N), statuts portés par objet, dépendances critiques. Documentation permissions par rôle dans Notion (modifications de statut et leurs conséquences).",
        conditions:"Outil libre (Whimsical, Canva, FigJam…). Inutile d'implémenter en Airtable ou Bubble à ce stade. Démontrer la compréhension du modèle produit, pas détailler tous les champs techniques. 4 types d'utilisateurs min avec permissions définies.",
        statut:"done",
        realise:"Schéma BDD 9 objets produit et documenté : User, Terrain, Créneau, Réservation, Session, Participation, Avis, Paiement, Notification. Relations 1-N et N-N modélisées. Statuts définis pour chaque objet pertinent. Dépendances critiques documentées (ex : Réservation dépend de Session complète). Matrice permissions 4 rôles (Joueur, Organisateur, Propriétaire terrain, Admin) en tableau couleur dans Notion. Dictionnaire de données exporté en Word. Diagramme SVG interactif généré."
      }
    ]
  },
  {
    label:"Sprint 5 — Semaines 9 & 10 · Affiner les aspects techniques",
    status:"todo", statusLabel:"À faire",
    sems:[
      {
        title:"Semaine 9 — Définir la stack technique",
        attendu:"Page Notion dédiée (distincte du backlog et de la roadmap) : liste des outils/services complémentaires à Bubble. Répondre aux 5 questions structurantes : source de vérité des données, outils exposés aux utilisateurs, outils réservés à PlayOff en interne, implémentation de la logique métier principale, limites techniques anticipées.",
        conditions:"Développement impératif sous Bubble. Libre sur la BDD (full Bubble / full Airtable / les deux) et les workflows (full Bubble / full Make / les deux). Justification du choix obligatoire — comprendre les limites et opportunités futures.",
        statut:"todo",
        realise:"À compléter. Matière disponible pour argumenter : travail BDD S8 (9 objets, schéma clair) → base pour décision Bubble vs Airtable. Automatisations Make S4-S5 déjà en place → argument pour conserver Make pour les workflows Ops. Stack vraisemblable à documenter : Bubble (front + logique métier) + Airtable (référentiel Ops) + Make (automatisations inter-systèmes)."
      },
      {
        title:"Semaine 10 — Implémentation technique (MVP Bubble)",
        attendu:"Application Bubble avec 4 pages minimum : connexion/inscription, liste des terrains avec pop-up de réservation, page création de session, page de réservation. Parcours principal fonctionnel de bout en bout sans blocage majeur.",
        conditions:"S'appuyer exclusivement sur le cas d'usage validé (S6), le schéma BDD (S8), la stack technique (S9). Pas d'application parfaite : MVP stable, compréhensible, démontrable. Un utilisateur doit pouvoir : accéder → comprendre → réserver un terrain de bout en bout.",
        statut:"todo",
        realise:"Non réalisé dans les sessions documentées. C'est le livrable technique central de la soutenance — celui sur lequel le jury s'attardera le plus. À prioriser en urgence. Matière de départ disponible : schéma BDD 9 objets (S8), 3 écrans Figma (S6), démo Lovable partielle (S7) comme référence de parcours."
      }
    ]
  },
  {
    label:"Sprint 6 — Semaines 11 & 12 · Création et finalisation de l'application",
    status:"todo", statusLabel:"À faire",
    sems:[
      {
        title:"Semaine 11 — Fin de l'implémentation",
        attendu:"MVP complet, sécurisé, documenté. Page Notion 'Sécurité – Sauvegarde, audit et gestion des incidents' comprenant : principes de sauvegarde et récupération des données, analyse des principaux risques de sécurité sur le périmètre MVP, plan d'action incidents (fuite de données, erreur critique, indisponibilité du service).",
        conditions:"Vérifier complétude MVP, robustesse workflows, privacy rules Bubble (permissions correctement définies), données sensibles non exposées. Limites du MVP identifiées et documentées. Application maîtrisée, pas parfaite. Statuts du produit permettent de comprendre l'état d'une session ou réservation.",
        statut:"todo",
        realise:"Page Sécurité Make déjà existante dans Notion (créée S5) — constitue une base solide. À compléter spécifiquement avec le volet Bubble : privacy rules implémentées, sauvegarde native Bubble (snapshots), plan d'incidents adapté à l'application TerrainLink. Matière partielle disponible pour les risques RGPD (contacts, données personnelles joueurs)."
      },
      {
        title:"Semaine 12 — Finalisation du projet Pro",
        attendu:"Finalisation de tous les livrables. Préparation de la soutenance orale : discours clair navigant entre vision produit (décideurs) et détail technique (jury expert Airtable/Make/Bubble). Expliquer les choix, arbitrages, limites et évolutions possibles.",
        conditions:"MVP compréhensible sans explication orale. Parcours principal sans blocage majeur. Limites assumées et explicables. Documentation permettant à quelqu'un d'autre de comprendre et d'utiliser l'application. Capacité à défendre chaque choix technique devant des experts.",
        statut:"todo",
        realise:"Non commencé. Semaine de consolidation avant la soutenance. Points clés à préparer pour l'oral : 1) Pourquoi Make plutôt que Zapier/n8n, 2) Logique du schéma BDD 9 objets et les dépendances, 3) Pourquoi le paiement est unique (1 payeur autorisé, pas de split multi-parties), 4) Ce qui est dans le MVP et ce qui en est volontairement exclu, 5) Évolutions réalistes post-MVP."
      }
    ]
  }
];

const colors = {done:"badge-done", partial:"badge-partial", todo:"badge-todo"};
const labels = {done:"✓ Fait", partial:"⚡ Partiel", todo:"À faire"};

function render(){
  const container = document.getElementById('sprints');
  data.forEach((sprint, si) => {
    const block = document.createElement('div');
    block.className = 'sprint-block';

    const hdr = document.createElement('div');
    hdr.className = 'sprint-header';
    hdr.innerHTML = `<h3>${sprint.label}</h3><span class="sprint-label ${sprint.status==='done'?'label-done':sprint.status==='partial'?'label-partial':'label-todo'}">${sprint.statusLabel}</span><span class="chevron" id="chev-${si}">▾</span>`;

    const body = document.createElement('div');
    body.className = 'sprint-body';
    body.id = `body-${si}`;

    sprint.sems.forEach(sem => {
      const row = document.createElement('div');
      row.className = 'sem-row';
      row.innerHTML = `
        <div class="sem-title">${sem.title}</div>
        <span class="badge ${colors[sem.statut]}">${labels[sem.statut]}</span>
        <div class="cols">
          <div>
            <div class="col-head">Ce qui était attendu</div>
            <div class="col-body">${sem.attendu}</div>
          </div>
          <div>
            <div class="col-head">Conditions / limites imposées</div>
            <div class="col-body">${sem.conditions}</div>
          </div>
          <div>
            <div class="col-head">Ce qui a été fait</div>
            <div class="col-body col-fait">${sem.realise}</div>
          </div>
        </div>
      `;
      body.appendChild(row);
    });

    hdr.addEventListener('click', () => {
      const isOpen = body.classList.toggle('open');
      document.getElementById(`chev-${si}`).style.transform = isOpen ? 'rotate(180deg)' : '';
    });

    block.appendChild(hdr);
    block.appendChild(body);
    container.appendChild(block);
  });

  document.getElementById('body-0').classList.add('open');
  document.getElementById('chev-0').style.transform = 'rotate(180deg)';
}

render();
</script>
</body>
</html>
